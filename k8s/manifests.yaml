# ============================================================
# DEPLOYMENT
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-dashboard
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gds-app
  template:
    metadata:
      labels:
        app: gds-app
    spec:
      containers:
        - name: dashboard
          # Replace with the ecr_repository_url Terraform output
          image: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/gds-app:latest
          ports:
            - containerPort: 5000   # Flask app port
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health         # Flask /health route
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20

---
# ============================================================
# SERVICE (ClusterIP)
# Internal selector — maps port 80 → pod port 5000
# The LB Controller registers these pod IPs into the ALB TG
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: mission-dashboard-svc
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: gds-app
  ports:
    - name: http
      port: 80          # Port the Ingress talks to
      targetPort: 5000  # Port the Flask container actually listens on
      protocol: TCP

---
# ============================================================
# INGRESS
# AWS LB Controller reads this and creates/manages the ALB,
# Target Group, and Listener automatically (Mode 1 — full K8s)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mission-dashboard-ingress
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing       # Public ALB in public subnets
    alb.ingress.kubernetes.io/target-type: ip               # Register pod IPs directly
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health     # Uses the Flask /health route
    alb.ingress.kubernetes.io/healthcheck-port: "5000"
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mission-dashboard-svc
                port:
                  number: 80
